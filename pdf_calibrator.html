<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calibrador de PDF - SINATEP</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f0;
      --surface: #ffffff;
      --surface-soft: #f7f9f8;
      --ink: #1d2529;
      --muted: #607076;
      --line: #d9e1df;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --accent-soft: #d9f0ec;
      --warn: #b45309;
      --danger: #b42318;
      --shadow: 0 16px 45px rgba(33, 47, 43, 0.16);
      --zoom: 1;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      font-size: 14px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
      height: 100vh;
      min-height: 640px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--line);
      background: var(--surface);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 64px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .filters {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .field-search,
    .select,
    .control,
    .textarea {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      outline: 0;
    }

    .field-search,
    .select,
    .control {
      padding: 8px 10px;
    }

    .field-search:focus,
    .select:focus,
    .control:focus,
    .textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .field-list {
      overflow: auto;
      padding: 10px;
      min-height: 0;
    }

    .group-title {
      margin: 14px 4px 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 42px;
      margin-bottom: 6px;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
    }

    .field-row:hover {
      background: var(--surface-soft);
      border-color: var(--line);
    }

    .field-row.active {
      background: var(--accent-soft);
      border-color: rgba(15, 118, 110, 0.35);
    }

    .field-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .coords {
      color: var(--accent-strong);
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
      white-space: nowrap;
    }

    .workspace {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-width: 0;
      min-height: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 64px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .button,
    .file-button,
    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font-weight: 750;
      line-height: 1;
      white-space: nowrap;
    }

    .button,
    .file-button {
      padding: 0 12px;
    }

    .icon-button {
      width: 36px;
      padding: 0;
    }

    .button:hover,
    .file-button:hover,
    .icon-button:hover {
      border-color: #b9c6c3;
      background: var(--surface-soft);
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .button.primary:hover {
      border-color: var(--accent-strong);
      background: var(--accent-strong);
    }

    .button.is-on {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .mini-select {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 0 8px;
      color: var(--ink);
      font-weight: 700;
    }

    .page-chip,
    .status-chip {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface-soft);
      padding: 0 10px;
      color: var(--muted);
      font-weight: 750;
      white-space: nowrap;
    }

    .stage-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      min-height: 0;
    }

    .canvas-scroll {
      position: relative;
      overflow: auto;
      min-width: 0;
      min-height: 0;
      padding: 24px;
      background:
        linear-gradient(90deg, rgba(31, 41, 37, 0.05) 1px, transparent 1px),
        linear-gradient(0deg, rgba(31, 41, 37, 0.05) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
    }

    .stage {
      position: relative;
      width: 612px;
      height: 1008px;
      margin: 0 auto;
      background: #fff;
      box-shadow: var(--shadow);
      transform-origin: top left;
    }

    #pdfCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    .grid-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background-image:
        linear-gradient(rgba(15, 118, 110, 0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 118, 110, 0.18) 1px, transparent 1px),
        linear-gradient(rgba(180, 83, 9, 0.26) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180, 83, 9, 0.26) 1px, transparent 1px);
      background-size:
        calc(10px * var(--zoom)) calc(10px * var(--zoom)),
        calc(10px * var(--zoom)) calc(10px * var(--zoom)),
        calc(50px * var(--zoom)) calc(50px * var(--zoom)),
        calc(50px * var(--zoom)) calc(50px * var(--zoom));
    }

    .grid-layer.visible {
      opacity: 1;
    }

    .field-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .overlay-item {
      position: absolute;
      width: 0;
      height: 0;
      pointer-events: auto;
      z-index: 5;
    }

    .overlay-item.hidden-page {
      display: none;
    }

    .field-badge {
      position: absolute;
      left: 0;
      bottom: 0;
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      max-width: min(360px, calc(100vw - 420px));
      border: 1px solid rgba(15, 118, 110, 0.72);
      border-radius: 5px;
      background: rgba(217, 240, 236, 0.82);
      color: #062c2a;
      cursor: grab;
      font-family: Helvetica, Arial, sans-serif;
      font-size: calc(10px * var(--zoom));
      line-height: 1;
      padding: calc(2px * var(--zoom)) calc(5px * var(--zoom));
      white-space: nowrap;
      user-select: none;
      box-shadow: 0 4px 14px rgba(15, 118, 110, 0.16);
    }

    .overlay-item:active {
      z-index: 20;
    }

    .overlay-item:active .field-badge {
      border-color: var(--warn);
      background: rgba(255, 237, 213, 0.92);
      color: #6a3506;
      box-shadow: 0 0 0 3px rgba(180, 83, 9, 0.18);
    }

    .field-badge:active {
      cursor: grabbing;
    }

    .field-anchor {
      position: absolute;
      left: -4px;
      bottom: -4px;
      width: 8px;
      height: 8px;
      border: 2px solid var(--danger);
      border-radius: 50%;
      background: #fff;
      pointer-events: none;
    }

    .image-box {
      position: absolute;
      left: 0;
      bottom: 0;
      display: grid;
      place-items: center;
      border: 2px dashed rgba(180, 83, 9, 0.78);
      background: rgba(255, 237, 213, 0.68);
      color: #7c3f07;
      cursor: grab;
      font-weight: 800;
      min-width: 40px;
      min-height: 28px;
      user-select: none;
    }

    .empty-state,
    .loading-state {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-weight: 800;
      text-align: center;
      z-index: 50;
    }

    .empty-state.visible,
    .loading-state.visible {
      display: grid;
    }

    .inspector {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-left: 1px solid var(--line);
      background: var(--surface);
    }

    .panel {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .selected-title {
      min-height: 22px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--ink);
      font-size: 16px;
      font-weight: 850;
      letter-spacing: 0;
      text-transform: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field-control {
      display: grid;
      gap: 5px;
    }

    .field-control.wide {
      grid-column: 1 / -1;
    }

    .field-control label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .nudge-grid {
      display: grid;
      grid-template-columns: repeat(3, 42px);
      grid-template-rows: repeat(3, 36px);
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
    }

    .nudge-grid .icon-button:nth-child(1) {
      grid-column: 2;
    }

    .nudge-grid .icon-button:nth-child(2) {
      grid-column: 1;
      grid-row: 2;
    }

    .nudge-grid .icon-button:nth-child(3) {
      grid-column: 3;
      grid-row: 2;
    }

    .nudge-grid .icon-button:nth-child(4) {
      grid-column: 2;
      grid-row: 3;
    }

    .meta-table {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .meta-table div {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
    }

    .meta-table strong {
      color: var(--ink);
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
      text-align: right;
    }

    .dialog-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(22, 31, 29, 0.48);
      z-index: 200;
    }

    .dialog-backdrop.visible {
      display: flex;
    }

    .dialog {
      width: min(980px, 100%);
      max-height: min(760px, calc(100vh - 48px));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .dialog-head,
    .dialog-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .dialog-actions {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      justify-content: flex-end;
    }

    .dialog-title {
      margin: 0;
      font-size: 18px;
    }

    .dialog-body {
      min-height: 0;
      padding: 16px;
      overflow: auto;
    }

    .textarea {
      min-height: 440px;
      padding: 12px;
      resize: vertical;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre;
    }

    .hidden-input {
      display: none;
    }

    @media (max-width: 1050px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(260px, 38vh) minmax(0, 1fr);
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .stage-layout {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
      }

      .inspector {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .inspector .panel {
        padding: 12px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (max-width: 680px) {
      .app {
        min-height: 100vh;
      }

      .brand,
      .topbar {
        min-height: auto;
      }

      .canvas-scroll {
        padding: 14px;
      }

      .toolbar-group {
        width: 100%;
      }

      .button,
      .file-button,
      .mini-select,
      .page-chip,
      .status-chip {
        flex: 1 1 auto;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span>SINATEP Calibrador</span>
        <small id="fieldCount">0 campos</small>
      </div>

      <div class="filters">
        <input class="field-search" id="fieldSearch" type="search" placeholder="Buscar campo">
        <select class="select" id="groupFilter" aria-label="Grupo">
          <option value="all">Todos os grupos</option>
        </select>
      </div>

      <div class="field-list" id="fieldList"></div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="toolbar-group">
          <label class="file-button" for="pdfUpload" title="Carregar PDF">
            <span aria-hidden="true">+</span>
            <span>Abrir PDF</span>
          </label>
          <input class="hidden-input" id="pdfUpload" type="file" accept="application/pdf,.pdf">
          <button class="button" id="loadDefaultButton" type="button">Modelo 2026</button>
          <button class="icon-button" id="prevPageButton" type="button" title="Página anterior" aria-label="Página anterior">‹</button>
          <span class="page-chip" id="pageInfo">1 / 1</span>
          <button class="icon-button" id="nextPageButton" type="button" title="Próxima página" aria-label="Próxima página">›</button>
        </div>

        <div class="toolbar-group">
          <select class="mini-select" id="zoomSelect" aria-label="Zoom">
            <option value="0.5">50%</option>
            <option value="0.75">75%</option>
            <option value="0.9">90%</option>
            <option value="1" selected>100%</option>
            <option value="1.25">125%</option>
            <option value="1.5">150%</option>
          </select>
          <select class="mini-select" id="snapSelect" aria-label="Precisão">
            <option value="0.5">0,5 pt</option>
            <option value="1" selected>1 pt</option>
            <option value="5">5 pt</option>
            <option value="10">10 pt</option>
          </select>
          <button class="button is-on" id="gridButton" type="button" aria-pressed="true">Grade</button>
          <button class="button" id="importButton" type="button">Importar</button>
          <button class="button" id="jsonButton" type="button">JSON</button>
          <button class="button primary" id="codeButton" type="button">Código</button>
        </div>
      </header>

      <section class="stage-layout">
        <div class="canvas-scroll" id="canvasScroll">
          <div class="stage" id="pdfStage">
            <canvas id="pdfCanvas"></canvas>
            <div class="grid-layer visible" id="gridLayer"></div>
            <div class="field-layer" id="fieldLayer"></div>
            <div class="empty-state" id="emptyState">Abra um PDF para calibrar</div>
            <div class="loading-state" id="loadingState">Carregando PDF</div>
          </div>
        </div>

        <aside class="inspector">
          <div class="panel">
            <div class="panel-title">
              <span>Selecionado</span>
              <span class="selected-title" id="selectedTitle">Nenhum campo</span>
            </div>

            <div class="form-grid">
              <div class="field-control">
                <label for="fieldPage">Página</label>
                <input class="control" id="fieldPage" type="number" min="1" step="1">
              </div>
              <div class="field-control">
                <label for="fieldFontSize">Fonte</label>
                <input class="control" id="fieldFontSize" type="number" min="4" step="0.5">
              </div>
              <div class="field-control">
                <label for="fieldX">X</label>
                <input class="control" id="fieldX" type="number" step="0.5">
              </div>
              <div class="field-control">
                <label for="fieldY">Y</label>
                <input class="control" id="fieldY" type="number" step="0.5">
              </div>
              <div class="field-control">
                <label for="fieldWidth">Largura</label>
                <input class="control" id="fieldWidth" type="number" step="1">
              </div>
              <div class="field-control">
                <label for="fieldHeight">Altura</label>
                <input class="control" id="fieldHeight" type="number" step="1">
              </div>
              <div class="field-control wide">
                <label for="fieldSample">Amostra</label>
                <input class="control" id="fieldSample" type="text">
              </div>
            </div>

            <div class="nudge-grid" aria-label="Mover campo">
              <button class="icon-button" type="button" data-nudge="up" title="Mover para cima">↑</button>
              <button class="icon-button" type="button" data-nudge="left" title="Mover para esquerda">←</button>
              <button class="icon-button" type="button" data-nudge="right" title="Mover para direita">→</button>
              <button class="icon-button" type="button" data-nudge="down" title="Mover para baixo">↓</button>
            </div>
          </div>

          <div class="panel">
            <div class="panel-title">PDF</div>
            <div class="meta-table">
              <div><span>Arquivo</span><strong id="pdfName">-</strong></div>
              <div><span>Tamanho</span><strong id="pdfSize">612 x 1008</strong></div>
              <div><span>Zoom</span><strong id="zoomMeta">100%</strong></div>
              <div><span>Status</span><strong id="statusMeta">Pronto</strong></div>
            </div>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <div class="dialog-backdrop" id="dialogBackdrop" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
    <div class="dialog">
      <div class="dialog-head">
        <h2 class="dialog-title" id="dialogTitle">Exportar</h2>
        <button class="icon-button" id="closeDialogButton" type="button" aria-label="Fechar">×</button>
      </div>
      <div class="dialog-body">
        <textarea class="textarea" id="dialogText" spellcheck="false"></textarea>
      </div>
      <div class="dialog-actions">
        <button class="button" id="applyImportButton" type="button">Aplicar</button>
        <button class="button primary" id="copyDialogButton" type="button">Copiar</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const DEFAULT_PDF_NAME = "Contrato 2026.pdf";
    const DEFAULT_PDF_URLS = [
      "assets/pdfs/Contrato 2026.pdf",
      "assets/pdfs/Contrato%202026.pdf",
      "./assets/pdfs/Contrato 2026.pdf",
      "./assets/pdfs/Contrato%202026.pdf",
      "/assets/pdfs/Contrato%202026.pdf"
    ];
    const PDF_IMAGE_FALLBACK = "assets/images/Contrato_2023_page-0001.jpg";

    const groups = [
      {
        id: "contratante",
        label: "Contratante",
        fields: [
          { id: "contratante", label: "Nome contratante", sample: "JOAO SILVA", expr: "info.contratante", comment: "Nome Contratante", x: 121, y: 762 },
          { id: "documento", label: "CPF contratante", sample: "123.456.789-00", expr: "info.documento", comment: "CPF", x: 64, y: 746 },
          { id: "rg", label: "RG", sample: "12.345.678-9", expr: "info.rg", comment: "RG", x: 202, y: 747 },
          { id: "dn_dia", label: "Nascimento dia", sample: "15", expr: "d", comment: "DN Dia", x: 491, y: 744 },
          { id: "dn_mes", label: "Nascimento mês", sample: "03", expr: "m", comment: "DN Mês", x: 513, y: 744 },
          { id: "dn_ano", label: "Nascimento ano", sample: "1990", expr: "y", comment: "DN Ano", x: 538, y: 744 },

    function formatNumber(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "0";
      return Number.isInteger(number) ? String(number) : number.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
    }

    function snap(value) {
      const step = Number(state.snap) || 1;
      return Math.round(value / step) * step;
    }

    function currentPageSize() {
      return state.pageSizes.get(state.pageNumber) || { width: 612, height: 1008 };
    }

    function fieldPageSize(field) {
      return state.pageSizes.get(field.page) || currentPageSize();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function setStatus(value) {
      els.statusMeta.textContent = value;
    }

    function clearFallbackImage() {
      els.pdfCanvas.style.visibility = "visible";
      els.pdfStage.style.backgroundImage = "";
      els.pdfStage.style.backgroundSize = "";
      els.pdfStage.style.backgroundPosition = "";
      els.pdfStage.style.backgroundRepeat = "";
    }

    function showFallbackImage() {
      state.pdfDoc = null;
      state.pdfName = "Imagem de referência";
      state.pageNumber = 1;
      state.pageCount = 1;
      state.pageSizes.set(1, { width: 612, height: 1008 });
      const pageSize = currentPageSize();
      els.pdfCanvas.width = pageSize.width * state.zoom;
      els.pdfCanvas.height = pageSize.height * state.zoom;
      els.pdfCanvas.style.width = `${pageSize.width * state.zoom}px`;
      els.pdfCanvas.style.height = `${pageSize.height * state.zoom}px`;
      els.pdfCanvas.style.visibility = "hidden";
      els.pdfStage.style.width = `${pageSize.width * state.zoom}px`;
      els.pdfStage.style.height = `${pageSize.height * state.zoom}px`;
      els.pdfStage.style.backgroundImage = `url("${PDF_IMAGE_FALLBACK}")`;
      els.pdfStage.style.backgroundSize = "100% 100%";
      els.pdfStage.style.backgroundPosition = "center";
      els.pdfStage.style.backgroundRepeat = "no-repeat";
      els.emptyState.classList.remove("visible");
      renderFieldLayer();
      renderInspector();
      renderFieldList();
      renderMeta();
      setStatus("Imagem de referência");
    }

    function initFilters() {
      groups.forEach(group => {
        const option = document.createElement("option");
        option.value = group.id;
        option.textContent = group.label;
        els.groupFilter.appendChild(option);
      });
      els.fieldCount.textContent = `${fields.length} campos`;
    }

    function renderFieldList() {
      const query = els.fieldSearch.value.trim().toLowerCase();
      const groupFilter = els.groupFilter.value;
      els.fieldList.innerHTML = "";

      groups.forEach(group => {
        if (groupFilter !== "all" && group.id !== groupFilter) return;

        const visibleFields = group.fields
          .map(field => fieldById.get(field.id))
          .filter(Boolean)
          .filter(field => {
          const haystack = `${field.label} ${field.id}`.toLowerCase();
          return !query || haystack.includes(query);
        });

        if (!visibleFields.length) return;

        const title = document.createElement("div");
        title.className = "group-title";
        title.textContent = group.label;
        els.fieldList.appendChild(title);

        visibleFields.forEach(field => {
          const row = document.createElement("button");
          row.type = "button";
          row.className = `field-row${field.id === state.activeId ? " active" : ""}`;
          row.dataset.fieldId = field.id;
          row.innerHTML = `
            <span class="field-name">${escapeHtml(field.label)}</span>
            <span class="coords" id="coords-${field.id}">${formatNumber(field.x)}, ${formatNumber(field.y)}</span>
          `;
          row.addEventListener("click", () => selectField(field.id, true));
          els.fieldList.appendChild(row);
        });
      });
    }

    function renderFieldLayer() {
      els.fieldLayer.innerHTML = "";
      if (!state.pdfDoc && !els.pdfStage.style.backgroundImage) return;
      fields.forEach(field => {
        const pageSize = fieldPageSize(field);
        const item = document.createElement("div");
        item.className = `overlay-item${field.page !== state.pageNumber ? " hidden-page" : ""}`;
        item.dataset.fieldId = field.id;
        item.style.left = `${field.x * state.zoom}px`;
        item.style.top = `${(pageSize.height - field.y) * state.zoom}px`;

        if (field.type === "image") {
          const box = document.createElement("div");
          box.className = "image-box";
          box.textContent = field.sample || field.label;
          box.style.width = `${(field.width || 100) * state.zoom}px`;
          box.style.height = `${(field.height || 100) * state.zoom}px`;
          box.style.fontSize = `${Math.max(10, 11 * state.zoom)}px`;
          item.appendChild(box);
        } else {
          const badge = document.createElement("div");
          badge.className = "field-badge";
          badge.textContent = field.sample || field.label;
          badge.style.fontSize = `${Math.max(8, (field.fontSize || 10) * state.zoom)}px`;
          item.appendChild(badge);
        }

        const anchor = document.createElement("span");
        anchor.className = "field-anchor";
        item.appendChild(anchor);

        item.addEventListener("pointerdown", event => startDrag(event, field));
        item.addEventListener("click", event => {
          event.stopPropagation();
          if (state.skipNextOverlayClick) {
            state.skipNextOverlayClick = false;
            return;
          }
          selectField(field.id, false);
        });

        els.fieldLayer.appendChild(item);
      });
    }

    function updateFieldPositionsOnly() {
      fields.forEach(field => {
        const item = els.fieldLayer.querySelector(`[data-field-id="${field.id}"]`);
        if (!item) return;
        const pageSize = fieldPageSize(field);
        item.style.left = `${field.x * state.zoom}px`;
        item.style.top = `${(pageSize.height - field.y) * state.zoom}px`;
        item.classList.toggle("hidden-page", field.page !== state.pageNumber);

        const imageBox = item.querySelector(".image-box");
        if (imageBox) {
          imageBox.style.width = `${(field.width || 100) * state.zoom}px`;
          imageBox.style.height = `${(field.height || 100) * state.zoom}px`;
        }
        const badge = item.querySelector(".field-badge");
        if (badge) {
          badge.style.fontSize = `${Math.max(8, (field.fontSize || 10) * state.zoom)}px`;
          badge.textContent = field.sample || field.label;
        }
      });

      document.querySelectorAll(".field-row").forEach(row => {
        row.classList.toggle("active", row.dataset.fieldId === state.activeId);
      });

      fields.forEach(field => {
        const coords = document.getElementById(`coords-${field.id}`);
        if (coords) coords.textContent = `${formatNumber(field.x)}, ${formatNumber(field.y)}`;
      });
    }

    function renderInspector() {
      const field = fieldById.get(state.activeId);
      const hasField = Boolean(field);
      els.selectedTitle.textContent = hasField ? field.label : "Nenhum campo";

      [els.fieldPage, els.fieldFontSize, els.fieldX, els.fieldY, els.fieldWidth, els.fieldHeight, els.fieldSample]
        .forEach(input => input.disabled = !hasField);

      if (!hasField) {
        els.fieldPage.value = "";
        els.fieldFontSize.value = "";
        els.fieldX.value = "";
        els.fieldY.value = "";
        els.fieldWidth.value = "";
        els.fieldHeight.value = "";
        els.fieldSample.value = "";
        return;
      }

      els.fieldPage.max = state.pageCount;
      els.fieldPage.value = field.page;
      els.fieldFontSize.value = field.fontSize || 10;
      els.fieldX.value = formatNumber(field.x);
      els.fieldY.value = formatNumber(field.y);
      els.fieldWidth.value = field.type === "image" ? formatNumber(field.width || 100) : "";
      els.fieldHeight.value = field.type === "image" ? formatNumber(field.height || 100) : "";
      els.fieldWidth.disabled = field.type !== "image";
      els.fieldHeight.disabled = field.type !== "image";
      els.fieldSample.value = field.sample || "";
    }

    function renderMeta() {
      const pageSize = currentPageSize();
      els.pageInfo.textContent = `${state.pageNumber} / ${state.pageCount}`;
      els.pdfName.textContent = state.pdfName;
      els.pdfSize.textContent = `${formatNumber(pageSize.width)} x ${formatNumber(pageSize.height)}`;
      els.zoomMeta.textContent = `${Math.round(state.zoom * 100)}%`;
      els.prevPageButton.disabled = state.pageNumber <= 1;
      els.nextPageButton.disabled = state.pageNumber >= state.pageCount;
      els.zoomSelect.value = String(state.zoom);
      els.snapSelect.value = String(state.snap);
      els.gridLayer.classList.toggle("visible", state.gridVisible);
      els.gridButton.classList.toggle("is-on", state.gridVisible);
      els.gridButton.setAttribute("aria-pressed", String(state.gridVisible));
      document.documentElement.style.setProperty("--zoom", state.zoom);
    }

    function selectField(id, jumpToPage) {
      const field = fieldById.get(id);
      if (!field) return;
      state.activeId = id;
      if (jumpToPage && field.page !== state.pageNumber) {
        state.pageNumber = field.page;
        renderPage();
      } else {
        updateFieldPositionsOnly();
        renderInspector();
        renderFieldList();
      }
    }

    function clearSelection() {
      state.activeId = null;
      updateFieldPositionsOnly();
      renderInspector();
      renderFieldList();
    }

    async function loadPdfFromArrayBuffer(arrayBuffer, name) {
      els.loadingState.classList.add("visible");
      els.emptyState.classList.remove("visible");
      clearFallbackImage();
      setStatus("Carregando");

      try {
        state.pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        state.pdfName = name;
        state.pageCount = state.pdfDoc.numPages;
        state.pageNumber = 1;
        state.pageSizes.clear();

        for (let pageIndex = 1; pageIndex <= state.pageCount; pageIndex += 1) {
          const page = await state.pdfDoc.getPage(pageIndex);
          const viewport = page.getViewport({ scale: 1 });
          state.pageSizes.set(pageIndex, { width: viewport.width, height: viewport.height });
        }

        fields.forEach(field => {
          if (field.page > state.pageCount) field.page = state.pageCount;
        });

        await renderPage();
        setStatus("Pronto");
      } catch (error) {
        console.error(error);
        setStatus("Erro");
        els.emptyState.textContent = `Erro ao carregar PDF: ${error.message}`;
        els.emptyState.classList.add("visible");
      } finally {
        els.loadingState.classList.remove("visible");
      }
    }

    async function loadPdfFromUrl(url, name) {
      els.loadingState.classList.add("visible");
      setStatus("Carregando");
      try {
        const cacheBreaker = `v=${Date.now()}`;
        const separator = url.includes("?") ? "&" : "?";
        const response = await fetch(`${url}${separator}${cacheBreaker}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const buffer = await response.arrayBuffer();
        await loadPdfFromArrayBuffer(buffer, name);
      } catch (error) {
        console.warn(error);
        els.loadingState.classList.remove("visible");
        els.emptyState.textContent = "Abra um PDF manualmente";
        els.emptyState.classList.add("visible");
        setStatus("Aguardando PDF");
      }
    }

    async function loadDefaultPdf() {
      els.loadingState.classList.add("visible");
      els.emptyState.classList.remove("visible");
      setStatus("Carregando");

      const errors = [];
      for (const url of DEFAULT_PDF_URLS) {
        try {
          const cacheBreaker = `v=${Date.now()}`;
          const separator = url.includes("?") ? "&" : "?";
          const response = await fetch(`${url}${separator}${cacheBreaker}`, { cache: "no-store" });
          if (!response.ok) throw new Error(`${url}: HTTP ${response.status}`);
          const buffer = await response.arrayBuffer();
          await loadPdfFromArrayBuffer(buffer, DEFAULT_PDF_NAME);
          return;
        } catch (error) {
          errors.push(error.message);
        }
      }

      console.warn("Falha ao carregar PDF padrão:", errors);
      els.loadingState.classList.remove("visible");
      showFallbackImage();
    }

    async function renderPage() {
      if (!state.pdfDoc) {
        renderFieldLayer();
        renderInspector();
        renderFieldList();
        renderMeta();
        return;
      }

      els.loadingState.classList.add("visible");
      const page = await state.pdfDoc.getPage(state.pageNumber);
      const viewport = page.getViewport({ scale: state.zoom });
      const pageSize = currentPageSize();
      const canvas = els.pdfCanvas;
      const context = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;
      canvas.style.width = `${viewport.width}px`;
      canvas.style.height = `${viewport.height}px`;
      els.pdfStage.style.width = `${pageSize.width * state.zoom}px`;
      els.pdfStage.style.height = `${pageSize.height * state.zoom}px`;

      await page.render({ canvasContext: context, viewport }).promise;
      els.loadingState.classList.remove("visible");
      els.emptyState.classList.remove("visible");

      renderFieldLayer();
      renderInspector();
      renderFieldList();
      renderMeta();
    }

    function startDrag(event, field) {
      event.preventDefault();
      event.stopPropagation();
      selectField(field.id, false);
      const target = event.currentTarget;
      const pageSize = fieldPageSize(field);
      const rect = els.pdfStage.getBoundingClientRect();
      const startCanvasX = (event.clientX - rect.left) / state.zoom;
      const startCanvasY = (event.clientY - rect.top) / state.zoom;
      const startAnchorCanvasY = pageSize.height - field.y;
      const drag = {
        pointerId: event.pointerId,
        offsetX: startCanvasX - field.x,
        offsetY: startCanvasY - startAnchorCanvasY,
        moved: false,
        ended: false
      };

      if (target.setPointerCapture && event.pointerId !== undefined) {
        try {
          target.setPointerCapture(event.pointerId);
        } catch (error) {
          console.warn("Não foi possível capturar o ponteiro:", error);
        }
      }

      const move = moveEvent => {
        if (drag.ended) return;
        if (moveEvent.pointerId !== undefined && moveEvent.pointerId !== drag.pointerId) return;
        moveEvent.preventDefault();
        const moveCanvasX = (moveEvent.clientX - rect.left) / state.zoom;
        const moveCanvasY = (moveEvent.clientY - rect.top) / state.zoom;
        const nextX = Math.max(0, Math.min(pageSize.width, snap(moveCanvasX - drag.offsetX)));
        const nextY = Math.max(0, Math.min(pageSize.height, snap(pageSize.height - (moveCanvasY - drag.offsetY))));
        if (nextX !== field.x || nextY !== field.y) {
          drag.moved = true;
        }
        field.x = nextX;
        field.y = nextY;
        updateFieldPositionsOnly();
        renderInspector();
      };

      const end = endEvent => {
        if (drag.ended) return;
        if (endEvent && endEvent.pointerId !== undefined && endEvent.pointerId !== drag.pointerId) return;
        drag.ended = true;

        document.removeEventListener("pointermove", move);
        document.removeEventListener("pointerup", end);
        document.removeEventListener("pointercancel", end);
        document.removeEventListener("mousemove", move);
        document.removeEventListener("mouseup", end);
        window.removeEventListener("blur", end);

        if (target.releasePointerCapture && drag.pointerId !== undefined) {
          try {
            if (!target.hasPointerCapture || target.hasPointerCapture(drag.pointerId)) {
              target.releasePointerCapture(drag.pointerId);
            }
          } catch (error) {
            console.warn("Não foi possível liberar o ponteiro:", error);
          }
        }

        state.skipNextOverlayClick = true;
        clearSelection();
        window.setTimeout(() => {
          state.skipNextOverlayClick = false;
        }, 250);
      };

      document.addEventListener("pointermove", move);
      document.addEventListener("pointerup", end);
      document.addEventListener("pointercancel", end);
      document.addEventListener("mousemove", move);
      document.addEventListener("mouseup", end);
      window.addEventListener("blur", end);
    }

    function updateActiveField(patch) {
      const field = fieldById.get(state.activeId);
      if (!field) return;
      Object.assign(field, patch);
      if (patch.page && patch.page !== state.pageNumber) {
        state.pageNumber = field.page;
        renderPage();
        return;
      }
      updateFieldPositionsOnly();
      renderInspector();
      renderFieldList();
    }

    function nudge(direction, largeStep) {
      const field = fieldById.get(state.activeId);
      if (!field) return;
      const pageSize = fieldPageSize(field);
      const amount = (Number(state.snap) || 1) * (largeStep ? 10 : 1);
      if (direction === "left") field.x = Math.max(0, snap(field.x - amount));
      if (direction === "right") field.x = Math.min(pageSize.width, snap(field.x + amount));
      if (direction === "up") field.y = Math.min(pageSize.height, snap(field.y + amount));
      if (direction === "down") field.y = Math.max(0, snap(field.y - amount));
      updateFieldPositionsOnly();
      renderInspector();
      renderFieldList();
    }

    function exportData() {
      return {
        pdf: {
          name: state.pdfName,
          page: state.pageNumber,
          pages: Array.from(state.pageSizes.entries()).map(([page, size]) => ({ page, ...size }))
        },
        fields: fields.map(field => ({
          id: field.id,
          label: field.label,
          group: field.groupLabel,
          page: field.page,
          x: Number(formatNumber(field.x)),
          y: Number(formatNumber(field.y)),
          type: field.type,
          fontSize: field.fontSize,
          width: field.type === "image" ? field.width : undefined,
          height: field.type === "image" ? field.height : undefined,
          sample: field.sample
        }))
      };
    }

    function line(expr, fieldId, comment, indent = "    ") {
      const field = fieldById.get(fieldId);
      return `${indent}draw(${expr}, ${formatNumber(field.x)}, ${formatNumber(field.y)});  // ${comment}`;
    }

    function switchLine(value, fieldId, comment) {
      const field = fieldById.get(fieldId);
      return `      case "${value}": draw("X", ${formatNumber(field.x)}, ${formatNumber(field.y)}); break;   // ${comment}`;
    }

    function exportCode() {
      const pageOne = state.pageSizes.get(1) || { width: 612, height: 1008 };
      const photo = fieldById.get("fotoCliente");
      return `    // ============================================
    // COORDENADAS CALIBRADAS - PDF: ${formatNumber(pageOne.width)} x ${formatNumber(pageOne.height)}
    // ============================================

    // Para a foto do cliente, ajuste a linha drawImage para:
    // firstPage.drawImage(image, { x: ${formatNumber(photo.x)}, y: ${formatNumber(photo.y)}, width: ${formatNumber(photo.width)}, height: ${formatNumber(photo.height)} });  // Foto Cliente

    // === CONTRATANTE ===
${line("info.contratante", "contratante", "Nome Contratante")}
${line("info.documento", "documento", "CPF")}
${line("info.rg", "rg", "RG")}
    if (info.dn) {
      const [d, m, y] = info.dn.split("/");
${line("d", "dn_dia", "DN Dia", "      if (d) ")}
${line("m", "dn_mes", "DN Mês", "      if (m) ")}
${line("y", "dn_ano", "DN Ano", "      if (y) ")}
    }
${line("info.filiacao", "filiacao", "Filiação")}
${line("info.naturalidade", "naturalidade", "Naturalidade")}

    if (info.sexo === "M") {
${line('"X"', "sexo_m", "Sexo M", "      ")}
    } else if (info.sexo === "F") {
${line('"X"', "sexo_f", "Sexo F", "      ")}
    }

${line("info.endereco", "endereco", "Endereço")}
${line("info.numero", "numero", "Número")}
${line("info.bairro", "bairro", "Bairro")}
${line("info.cidade", "cidade", "Cidade")}
${line("info.cep", "cep", "CEP")}
${line("info.uf", "uf", "UF")}
${line("info.telefones", "telefones", "Telefones")}

    // === ALUNO ===
${line("info.aluno", "aluno", "Nome Aluno")}
${line("info.alunoDocumento", "alunoDocumento", "CPF/RG Aluno")}
    if (info.alunoDN) {
      const [d, m, y] = info.alunoDN.split("/");
${line("d", "alunoDN_dia", "Aluno DN Dia", "      if (d) ")}
${line("m", "alunoDN_mes", "Aluno DN Mês", "      if (m) ")}
${line("y", "alunoDN_ano", "Aluno DN Ano", "      if (y) ")}
    }
${line("info.alunoNaturalidade", "alunoNaturalidade", "Aluno Naturalidade")}
${line("info.alunoTelefone", "alunoTelefone", "Aluno Telefone")}

    // === OPÇÃO DE CURSO ===
    const opcaoCursoRaw = info.opcaoCurso !== undefined && info.opcaoCurso !== null ? String(info.opcaoCurso).trim() : "";
    const opcaoCursoKeyMatch = opcaoCursoRaw.match(/^[1-4]/);
    const opcaoCursoKey = opcaoCursoKeyMatch ? opcaoCursoKeyMatch[0] : opcaoCursoRaw;

    switch (opcaoCursoKey) {
${switchLine("1", "curso_1", "Curso 1")}
${switchLine("2", "curso_2", "Curso 2")}
${switchLine("3", "curso_3", "Curso 3")}
${switchLine("4", "curso_4", "Curso 4")}
    }

    if (opcaoCursoKey === "4" && info.outro) {
${line("info.outro", "outro", "Outro/Qual", "      ")}
    }

${line("info.indicacao", "indicacao", "Indicação")}

    // === DISPOSIÇÕES INICIAIS ===
    if (info.horas) {
${line("info.horas", "horas", "Carga Horária", "      ")}
    }

    if (info.inicioPrevisto) {
      const parts = info.inicioPrevisto.split("/");
${line("parts[0]", "inicio_dia", "Início Dia", "      if (parts.length >= 1) ")}
${line("parts[1]", "inicio_mes", "Início Mês", "      if (parts.length >= 2) ")}
    }
${line("info.contratada", "contratada", "Contratada")}

    // === PAGAMENTO (Checkboxes) ===
    switch (info.pagamento) {
${switchLine("36", "pag_36x", "36x")}
${switchLine("24", "pag_24x", "24x")}
${switchLine("18", "pag_18x", "18x")}
${switchLine("14", "pag_14x", "14x")}
${switchLine("8", "pag_8x", "8x")}
${switchLine("3", "pag_3x", "3x")}
${switchLine("12", "pag_12x", "À vista/cartão")}
    }

    // === PRIMEIRA PARCELA E DESCONTO ===
    if (info.primeiraParcela) {
      const [d, m, y] = info.primeiraParcela.split("/");
${line("d", "parcela_dia", "Parcela Dia", "      if (d) ")}
${line("m", "parcela_mes", "Parcela Mês", "      if (m) ")}
${line("y", "parcela_ano", "Parcela Ano", "      if (y) ")}
    }

${line("info.descontoRS", "desconto", "Desconto R$")}

    // === DATA FINAL (RODAPÉ) ===
    const dataFinal = info.criado_str ? info.criado_str.split("/") : [];
    if (dataFinal.length === 3) {
${line("dataFinal[0]", "data_dia", "Data Dia", "      ")}
${line("dataFinal[1]", "data_mes", "Data Mês", "      ")}
${line("dataFinal[2]", "data_ano", "Data Ano", "      ")}
    } else {
      const today = new Date();
${line("String(today.getDate())", "data_dia", "Data Dia", "      ")}
${line("String(today.getMonth() + 1)", "data_mes", "Data Mês", "      ")}
${line("String(today.getFullYear())", "data_ano", "Data Ano", "      ")}
    }`;
    }

    function openDialog(title, text, mode) {
      state.dialogMode = mode;
      els.dialogTitle.textContent = title;
      els.dialogText.value = text;
      els.applyImportButton.style.display = mode === "import" ? "inline-flex" : "none";
      els.copyDialogButton.style.display = mode === "import" ? "none" : "inline-flex";
      els.dialogBackdrop.classList.add("visible");
      els.dialogText.focus();
      els.dialogText.select();
    }

    function closeDialog() {
      els.dialogBackdrop.classList.remove("visible");
    }

    async function copyDialog() {
      await navigator.clipboard.writeText(els.dialogText.value);
      setStatus("Copiado");
      setTimeout(() => setStatus("Pronto"), 1200);
    }

    function importCoordinates(text) {
      let updated = 0;

      try {
        const parsed = JSON.parse(text);
        const sourceFields = Array.isArray(parsed) ? parsed : parsed.fields;
        if (Array.isArray(sourceFields)) {
          sourceFields.forEach(item => {
            const field = fieldById.get(item.id);
            if (!field) return;
            if (Number.isFinite(Number(item.x))) field.x = Number(item.x);
            if (Number.isFinite(Number(item.y))) field.y = Number(item.y);
            if (Number.isFinite(Number(item.page))) field.page = Math.max(1, Math.min(state.pageCount, Number(item.page)));
            if (Number.isFinite(Number(item.fontSize))) field.fontSize = Number(item.fontSize);
            if (field.type === "image" && Number.isFinite(Number(item.width))) field.width = Number(item.width);
            if (field.type === "image" && Number.isFinite(Number(item.height))) field.height = Number(item.height);
            if (item.sample !== undefined) field.sample = String(item.sample);
            updated += 1;
          });
          afterImport(updated);
          return;
        }
      } catch (error) {
        parseCodeCoordinates(text, count => {
          updated = count;
        });
        afterImport(updated);
        return;
      }

      parseCodeCoordinates(text, count => {
        updated = count;
      });
      afterImport(updated);
    }

    function afterImport(updated) {
      closeDialog();
      updateFieldPositionsOnly();
      renderInspector();
      renderFieldList();
      renderMeta();
      setStatus(`${updated} campos`);
      setTimeout(() => setStatus("Pronto"), 1400);
    }

    function parseCodeCoordinates(code, done) {
      let updated = 0;

      fields.forEach(field => {
        if (field.type === "image") {
          const imageRegex = /drawImage\(image,\s*\{\s*x:\s*([0-9.]+),\s*y:\s*([0-9.]+),\s*width:\s*([0-9.]+),\s*height:\s*([0-9.]+)/;
          const match = code.match(imageRegex);
          if (match) {
            field.x = Number(match[1]);
            field.y = Number(match[2]);
            field.width = Number(match[3]);
            field.height = Number(match[4]);
            updated += 1;
          }
          return;
        }

        const comment = field.comment.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const regex = new RegExp(`draw\\([^\\n;]+,\\s*([0-9.]+),\\s*([0-9.]+)\\);\\s*//\\s*${comment}`);
        const match = code.match(regex);
        if (match) {
          field.x = Number(match[1]);
          field.y = Number(match[2]);
          updated += 1;
        }
      });

      done(updated);
    }

    function bindEvents() {
      els.fieldSearch.addEventListener("input", renderFieldList);
      els.groupFilter.addEventListener("change", renderFieldList);

      els.pdfUpload.addEventListener("change", async event => {
        const file = event.target.files[0];
        if (!file) return;
        await loadPdfFromArrayBuffer(await file.arrayBuffer(), file.name);
      });

      els.loadDefaultButton.addEventListener("click", loadDefaultPdf);
      els.prevPageButton.addEventListener("click", async () => {
        if (state.pageNumber <= 1) return;
        state.pageNumber -= 1;
        await renderPage();
      });
      els.nextPageButton.addEventListener("click", async () => {
        if (state.pageNumber >= state.pageCount) return;
        state.pageNumber += 1;
        await renderPage();
      });

      els.zoomSelect.addEventListener("change", async event => {
        state.zoom = Number(event.target.value);
        await renderPage();
      });

      els.snapSelect.addEventListener("change", event => {
        state.snap = Number(event.target.value);
        renderMeta();
      });

      els.gridButton.addEventListener("click", () => {
        state.gridVisible = !state.gridVisible;
        renderMeta();
      });

      els.importButton.addEventListener("click", () => openDialog("Importar coordenadas", "", "import"));
      els.jsonButton.addEventListener("click", () => openDialog("Coordenadas em JSON", JSON.stringify(exportData(), null, 2), "export"));
      els.codeButton.addEventListener("click", () => openDialog("Bloco de código", exportCode(), "export"));
      els.closeDialogButton.addEventListener("click", closeDialog);
      els.copyDialogButton.addEventListener("click", copyDialog);
      els.applyImportButton.addEventListener("click", () => importCoordinates(els.dialogText.value));
      els.dialogBackdrop.addEventListener("click", event => {
        if (event.target === els.dialogBackdrop) closeDialog();
      });

      els.fieldPage.addEventListener("change", event => {
        const page = Math.max(1, Math.min(state.pageCount, Number(event.target.value) || 1));
        updateActiveField({ page });
      });
      els.fieldFontSize.addEventListener("input", event => updateActiveField({ fontSize: Number(event.target.value) || 10 }));
      els.fieldX.addEventListener("input", event => updateActiveField({ x: Number(event.target.value) || 0 }));
      els.fieldY.addEventListener("input", event => updateActiveField({ y: Number(event.target.value) || 0 }));
      els.fieldWidth.addEventListener("input", event => updateActiveField({ width: Math.max(1, Number(event.target.value) || 1) }));
      els.fieldHeight.addEventListener("input", event => updateActiveField({ height: Math.max(1, Number(event.target.value) || 1) }));
      els.fieldSample.addEventListener("input", event => updateActiveField({ sample: event.target.value }));

      document.querySelectorAll("[data-nudge]").forEach(button => {
        button.addEventListener("click", () => nudge(button.dataset.nudge, false));
      });

      document.addEventListener("keydown", event => {
        const tag = event.target.tagName;
        if (["INPUT", "TEXTAREA", "SELECT"].includes(tag)) return;
        if (event.key === "Escape" && els.dialogBackdrop.classList.contains("visible")) {
          closeDialog();
          return;
        }
        const directions = {
          ArrowLeft: "left",
          ArrowRight: "right",
          ArrowUp: "up",
          ArrowDown: "down"
        };
        const direction = directions[event.key];
        if (direction) {
          event.preventDefault();
          nudge(direction, event.shiftKey);
        }
      });
    }

    function init() {
      initFilters();
      bindEvents();
      renderFieldList();
      renderFieldLayer();
      renderInspector();
      renderMeta();
      loadDefaultPdf();
    }

    init();
  </script>
</body>

</html>
